# Runs `R CMD check` (build, install, examples, tests) on every push/PR to
# main, plus a standalone testthat run so test failures show up clearly even
# if a full R CMD check NOTE/WARNING buries them.
#
# NOTE: several Suggests (GLM3r, WETr, SelmaprotbasR, SimstratR, MyLakeR) are
# GitHub-only wrappers around external model binaries. GLM3r in particular is
# unresolvable via pak's dependency SOLVE step (not just install) because
# glmtools -- a hard Imports dependency we need regardless -- declares GLM3r
# under its own Depends: with no Remotes: entry of its own, and our Remotes:
# entry for GLM3r doesn't propagate to satisfy glmtools' separate nested need
# for it (a pak/remotes limitation, not something fixable from this repo).
# That made `pak::lockfile_create()` fail outright ("dependency conflict")
# when it tried to resolve the full Suggests set. Since none of our tests
# actually exercise the real model-runner packages, `dependencies: '"hard"'`
# below tells pak to resolve only Depends/Imports/LinkingTo and skip Suggests
# entirely -- test/build tooling (testthat/knitr/rmarkdown) is added back
# explicitly via extra-packages instead. _R_CHECK_FORCE_SUGGESTS_: false
# then tells R CMD check itself not to require the skipped Suggests either.
# Hard Imports (LakeEnsemblR, glmtools, gotmtools, etc.) still need to
# install successfully for the package to load at all -- if this workflow
# fails at the "Install dependencies"/"Query dependencies" step, check
# whether one of those needs its own Remotes: entry in DESCRIPTION.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::rcmdcheck, any::testthat, any::knitr, any::rmarkdown
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true

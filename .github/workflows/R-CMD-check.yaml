# Runs `R CMD check` (build, install, examples, tests) on every push/PR to
# main, plus a standalone testthat run so test failures show up clearly even
# if a full R CMD check NOTE/WARNING buries them.
#
# NOTE: several Suggests (GLM3r, WETr, SelmaprotbasR, SimstratR, MyLakeR) are
# GitHub-only wrappers around external model binaries. `dependencies: '"hard"'`
# below tells pak to resolve only Depends/Imports/LinkingTo and skip Suggests
# entirely -- test/build tooling (testthat/knitr/rmarkdown) is added back
# explicitly via extra-packages instead. _R_CHECK_FORCE_SUGGESTS_: false then
# tells R CMD check itself not to require the skipped Suggests either.
#
# GLM3r still needs a separate workaround even with Suggests skipped: glmtools
# (a HARD Imports dependency we need regardless of which model you run)
# declares GLM3r under its own Depends: with no Remotes: entry of its own, and
# our Remotes: entry for GLM3r doesn't propagate to satisfy glmtools' separate
# nested need for it (a pak/remotes limitation, not fixable from this repo).
# That makes pak's dependency SOLVE step fail outright ("Can't find package
# called GLM3r"), regardless of Suggests-skipping, since glmtools->GLM3r is a
# hard edge. Fix: pre-install GLM3r directly via remotes (which just checks
# "is this installed" rather than solving the whole graph) BEFORE the pak-based
# setup-r-dependencies step runs -- once GLM3r is already present locally, pak
# accepts it as satisfying glmtools' dependency instead of needing a resolvable
# source for it.
#
# If this workflow fails at "Install dependencies"/"Query dependencies" for a
# DIFFERENT package, check whether that one needs its own Remotes: entry in
# DESCRIPTION, or (if it's a hard dependency of one of our dependencies rather
# than of this package directly) its own pre-install step below.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Pre-install GLM3r (see NOTE above -- works around glmtools' undeclared nested dependency)
        run: |
          install.packages("remotes")
          remotes::install_github("aemon-j/GLM3r@v3.3", upgrade = "never")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::rcmdcheck, any::testthat, any::knitr, any::rmarkdown
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true

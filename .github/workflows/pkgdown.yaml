# Rebuilds the pkgdown site and publishes it to the gh-pages branch. docs/
# (the built output) is intentionally NOT tracked on main -- see .gitignore --
# so GitHub Pages should be configured to serve from the gh-pages branch
# (Settings -> Pages -> Deploy from a branch -> gh-pages / (root)), not from
# main's docs/ folder.
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: {}

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # See R-CMD-check.yaml for the full explanation: glmtools (a hard
      # Imports dependency) has an undeclared nested dependency on GLM3r that
      # breaks pak's solve step. Pre-installing it directly via remotes (which
      # just checks "is this installed" rather than solving the whole graph)
      # works around it.
      - name: Pre-install GLM3r
        run: |
          install.packages("remotes")
          remotes::install_github("aemon-j/GLM3r@v3.3", upgrade = "never")
        shell: Rscript {0}

      # dependencies: "hard" skips Suggests (WETr/SelmaprotbasR/SimstratR/
      # MyLakeR) -- pkgdown site building doesn't need those since vignette
      # chunks are all eval=FALSE.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::pkgdown, any::knitr, any::rmarkdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs

# Rebuilds the pkgdown site and publishes it to the gh-pages branch. docs/
# (the built output) is intentionally NOT tracked on main -- see .gitignore --
# so GitHub Pages should be configured to serve from the gh-pages branch
# (Settings -> Pages -> Deploy from a branch -> gh-pages / (root)), not from
# main's docs/ folder.
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: {}

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # dependencies: "hard" skips Suggests (GLM3r/WETr/SelmaprotbasR/SimstratR/
      # MyLakeR) -- resolving them pulls in glmtools' undeclared nested GLM3r
      # dependency and breaks pak's solve step. See R-CMD-check.yaml for the
      # full explanation. pkgdown site building doesn't need those packages
      # since vignette chunks are all eval=FALSE.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::pkgdown, any::knitr, any::rmarkdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
